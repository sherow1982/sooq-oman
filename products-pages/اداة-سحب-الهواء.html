<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أداة سحب الهواء | سوق عمّان</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #114c7d;
            --secondary: #25D366;
            --accent: #e74c3c;
            --success: #27ae60;
            --light: #ecf0f1;
            --dark: #2c3e50;
            --text: #34495e;
        }
        html, body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: var(--text);
        }
        header {
            background: linear-gradient(135deg, var(--primary) 0%, #0a3a5c 100%);
            padding: 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        nav {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            color: white;
            font-size: 20px;
            font-weight: bold;
            text-decoration: none;
        }
        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-size: 14px;
        }
        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .product-section {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            padding: 40px;
            animation: fadeIn 0.6s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .gallery { display: flex; flex-direction: column; gap: 15px; }
        .main-image-container {
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            background: var(--light);
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .main-image { width: 100%; height: 100%; object-fit: contain; }
        .badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: var(--accent);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        .product-info { display: flex; flex-direction: column; justify-content: space-between; }
        h1 { color: var(--dark); font-size: 28px; margin: 15px 0; }
        .pricing-section {
            background: linear-gradient(135deg, #fff5f5 0%, #ffe8e8 100%);
            padding: 25px;
            border-radius: 12px;
            margin: 25px 0;
        }
        .price-wrapper { display: flex; align-items: center; gap: 15px; margin-bottom: 12px; }
        .sale-price { font-size: 42px; color: var(--accent); font-weight: bold; }
        .trust-section { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin: 30px 0; }
        .trust-item { background: var(--light); padding: 15px; border-radius: 10px; text-align: center; }
        .action-buttons { display: flex; gap: 12px; margin: 30px 0; }
        .btn {
            flex: 1;
            padding: 14px 20px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            color: white;
        }
        .btn-primary { background: linear-gradient(135deg, var(--primary) 0%, #0a3a5c 100%); }
        .btn-whatsapp { background: linear-gradient(135deg, var(--secondary) 0%, #1da851 100%); }
        .shipping-info {
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            padding: 20px;
            border-radius: 10px;
            margin: 25px 0;
        }
        footer {
            background: linear-gradient(135deg, var(--primary) 0%, #0a3a5c 100%);
            color: white;
            text-align: center;
            padding: 30px 20px;
            margin-top: 50px;
        }
        @media (max-width: 768px) {
            .product-section { grid-template-columns: 1fr; }
            .action-buttons { flex-direction: column; }
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="/" class="logo">🛒 سوق عمّان</a>
            <div style="display: flex; gap: 20px;">
                <a href="/">الرئيسية</a>
                <a href="/cart">السلة</a>
                <a href="/contact">اتصل</a>
            </div>
        </nav>
    </header>
    <div class="container">
        <div class="product-section">
            <div class="gallery">
                <div class="main-image-container">
                    <div class="badge">خصم 12%</div>
                    <img src="https://firebasestorage.googleapis.com/v0/b/ashyaatcrm.appspot.com/o/images%2FashyaatKiNjrD8C.jpg?alt=media" class="main-image">
                </div>
            </div>
            <div class="product-info">
                <div>
                    <h1>أداة سحب الهواء</h1>
                    <div class="pricing-section">
                        <div class="price-wrapper">
                            <span style="color: #95a5a6; text-decoration: line-through;">18.0 ر.ع</span>
                            <span class="sale-price">15.8 ر.ع</span>
                        </div>
                    </div>
                    <div class="trust-section">
                        <div class="trust-item"><div style="font-size: 24px;">✓</div><div>شحن مجاني</div></div>
                        <div class="trust-item"><div style="font-size: 24px;">🔄</div><div>ضمان</div></div>
                        <div class="trust-item"><div style="font-size: 24px;">🔒</div><div>دفع آمن</div></div>
                    </div>
                </div>
                <div class="shipping-info">
                    <h3 style="color: var(--success); margin-bottom: 12px;">📌 معلومات الشحن</h3>
                    <div style="font-size: 13px; color: #2e7d32; margin: 8px 0;">✓ التوصيل خلال 3 أيام</div>
                    <div style="font-size: 13px; color: #2e7d32; margin: 8px 0;">✓ شحن مجاني</div>
                </div>
                <div class="action-buttons">
                    <button class="btn btn-primary">🛒 أضف للسلة</button>
                    <button class="btn btn-whatsapp">💬 طلب</button>
                </div>
            </div>
        </div>
    </div>
    <footer><p>سوق عمّان 2025</p></footer>
</body>
</html>

name: Update All Product Pages

on:
  workflow_dispatch:
  push:
    paths:
      - 'product-template-pro.html'
      - 'update-all-products.js'

jobs:
  update-products:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Run product update script
      run: |
        echo "🚀 Starting product pages update..."
        node update-all-products.js
        echo "✅ Update completed!"

    - name: Check for changes
      id: check_changes
      run: |
        if [[ -n $(git status --porcelain) ]]; then
          echo "changes=true" >> $GITHUB_OUTPUT
          echo "📊 Changes detected in product pages"
        else
          echo "changes=false" >> $GITHUB_OUTPUT
          echo "ℹ️ No changes detected"
        fi

    - name: Commit and push changes
      if: steps.check_changes.outputs.changes == 'true'
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "GitHub Actions Bot"
        git add products-pages/*.html
        git commit -m "🎨 Auto-update: Convert all product pages to professional template design
        
        - Updated $(git diff --cached --numstat | wc -l) product pages
        - Applied modern UI/UX with gradients and animations
        - Enhanced mobile responsiveness
        - Improved SEO structure
        - Added trust badges and shipping info
        
        Generated by GitHub Actions"
        git push

    - name: Create success summary
      if: steps.check_changes.outputs.changes == 'true'
      run: |
        echo "🎉 Successfully updated all product pages!" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📈 Update Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ All product pages converted to professional template" >> $GITHUB_STEP_SUMMARY
        echo "- 📊 Updated files: $(git diff HEAD~1 --name-only | wc -l)" >> $GITHUB_STEP_SUMMARY
        echo "- 🔗 Commit: [View Changes](https://github.com/${{ github.repository }}/commit/$(git rev-parse HEAD))" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### ✨ New Features" >> $GITHUB_STEP_SUMMARY
        echo "- Modern gradient backgrounds" >> $GITHUB_STEP_SUMMARY
        echo "- Smooth animations and transitions" >> $GITHUB_STEP_SUMMARY
        echo "- Enhanced product image gallery" >> $GITHUB_STEP_SUMMARY
        echo "- Trust badges (free shipping, warranty, secure payment)" >> $GITHUB_STEP_SUMMARY
        echo "- Improved mobile responsiveness" >> $GITHUB_STEP_SUMMARY
        echo "- Better SEO structure" >> $GITHUB_STEP_SUMMARY

    - name: No changes summary
      if: steps.check_changes.outputs.changes == 'false'
      run: |
        echo "ℹ️ No product pages needed updating" >> $GITHUB_STEP_SUMMARY
        echo "All pages are already up to date!" >> $GITHUB_STEP_SUMMARY
